<div class="container">
  <div class="acciones-superiores">
    <button mat-raised-button color="primary" (click)="volverCatalogo()">
      Volver al catálogo
    </button>
  </div>

  <h2>Mis Reservas</h2>

  <table mat-table [dataSource]="reservas" class="mat-elevation-z8 full-width">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID Reserva</th>
      <td mat-cell *matCellDef="let reserva">{{ reserva.id }}</td>
    </ng-container>

    <ng-container matColumnDef="libro_id">
      <th mat-header-cell *matHeaderCellDef>ID Libro</th>
      <td mat-cell *matCellDef="let reserva">{{ reserva.libro_id }}</td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let reserva">{{ reserva.estado }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let reserva">
        <button mat-raised-button color="warn" (click)="cancelar(reserva.id!)">
          Cancelar
        </button>

        <button mat-raised-button color="accent" (click)="devolver(reserva.id!)">
          Devolver
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
