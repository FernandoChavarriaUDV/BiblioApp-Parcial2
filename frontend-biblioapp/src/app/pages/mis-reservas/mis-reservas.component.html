<div class="container">
  <button mat-raised-button color="primary" (click)="volverCatalogo()">
    Volver al catálogo
  </button>

  <h2>Mis Reservas</h2>

  <table mat-table [dataSource]="reservas" class="mat-elevation-z8 full-width">

    <!-- ID Reserva -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID Reserva</th>
      <td mat-cell *matCellDef="let reserva">{{ reserva.id }}</td>
    </ng-container>

    <!-- ID Libro -->
    <ng-container matColumnDef="libro_id">
      <th mat-header-cell *matHeaderCellDef>ID Libro</th>
      <td mat-cell *matCellDef="let reserva">{{ reserva.libro_id }}</td>
    </ng-container>

    <!-- Estado -->
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let reserva">
        {{ reserva.estado }}
      </td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let reserva">

        <!-- SOLO SI ESTA ACTIVA -->
        <ng-container *ngIf="reserva.estado === 'ACTIVA'">

          <button mat-raised-button color="warn"
                  (click)="cancelar(reserva.id!)">
            Cancelar
          </button>

          <button mat-raised-button color="accent"
                  (click)="devolver(reserva.id!)">
            Devolver
          </button>

        </ng-container>

        <!-- OPCIONAL: mensaje cuando ya no aplica -->
        <ng-container *ngIf="reserva.estado !== 'ACTIVA'">
          <span style="color: gray;">Sin acciones disponibles</span>
        </ng-container>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
</div>
